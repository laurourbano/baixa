<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baixa de RT</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css">
    <link rel="stylesheet" href="css/padrao.css">
</head>
<body class="bg-dark text-light">

    <header class="text-center py-3">
        <h5>Portal de Pareceres - Baixa RT</h5>
    </header>

    <main class="container">
        <!-- Grid de Cards Dinâmicos -->
        <div id="main-grid" class="cards-grid"></div>

        <!-- Ferramentas Fixas (Calculadora e Busca) ao Final -->
        <div class="row mt-5 mb-4">
            <div class="col-md-6 mb-2">
                <div class="tool-box border-info">
                    <h6>Calculadora de Piso</h6>
                    <div class="d-flex gap-2">
                        <input id="piso" type="number" placeholder="Valor Piso" class="form-control mr-2">
                        <input id="horas" type="number" placeholder="Horas" class="form-control">
                    </div>
                    <div class="mt-2 small">Total: R$ <span id="res-total">0</span> | Hora: R$ <span id="res-hora">0</span></div>
                </div>
            </div>
            <div class="col-md-6 mb-2">
                <div class="tool-box border-warning">
                    <h6>Busca de Fiscal</h6>
                    <select id="fiscal-select" class="form-control" disabled><option>Carregando...</option></select>
                    <div id="fiscal-res" class="mt-2 small text-muted">Aguardando...</div>
                </div>
            </div>
        </div>
    </main>

    <button class="btn-add" onclick="MainApp.openCreate()">+</button>

    <!-- Modal Simplificado -->
    <div id="modal" class="modal-overlay">
        <div class="modal-box">
            <h6>Editar Card</h6>
            <input id="m-id" type="hidden">
            <input id="m-title" type="text" placeholder="Título" class="form-control mb-2">
            <select id="m-color" class="form-control mb-2">
                <option value="light">Padrão</option><option value="danger">Vermelho</option>
                <option value="warning">Amarelo</option><option value="info">Azul</option>
            </select>
            <div class="row mb-1">
                <div class="col-4"><input id="m-local" type="text" placeholder="Local" class="form-control"></div>
                <div class="col-4"><input id="m-sit" type="text" placeholder="Situação" class="form-control"></div>
                <div class="col-4"><input id="m-julg" type="text" placeholder="Julgamento" class="form-control"></div>
            </div>
            <textarea id="m-content" rows="4" placeholder="Conteúdo" class="form-control mb-2"></textarea>
            <div class="text-right">
                <button onclick="MainApp.closeModal()" class="btn btn-sm btn-secondary">Cancelar</button>
                <button onclick="saveCard()" class="btn btn-sm btn-success">Salvar</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
