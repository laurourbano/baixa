<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Portal de Pareceres - Baixa RT">
    <title>Portal de Pareceres - Baixa RT</title>
    <meta name="author" content="Lauro Urbano">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="./assets/img/logo.png">

    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/padrao.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Background Blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <!-- LOGIN OVERLAY (Será escondido automaticamente) -->
    <div id="login-overlay" class="login-overlay d-none align-items-center justify-content-center">
        <div class="login-card p-4 shadow-lg text-center animate-pop-in">
            <div class="mb-4">
                <img src="./assets/img/logo.png" alt="Logo" style="width: 80px; height: 80px; object-fit: contain;">
                <h4 class="fw-bold mb-1">Acesso ao Portal</h4>
            </div>

            <div class="mb-3 text-start">
                <label class="x-small text-muted mb-1">E-mail</label>
                <input type="email" id="login-email" class="form-control bg-dark text-light border-secondary mb-2"
                    placeholder="seu@email.com">

                <label class="x-small text-muted mb-1">Senha</label>
                <input type="password" id="login-password"
                    class="form-control bg-dark text-light border-secondary text-center" placeholder="••••"
                    maxlength="4">

                <div id="login-error" class="text-danger x-small mt-2 d-none">Credenciais incorretas!</div>
            </div>

            <button onclick="MainApp.checkLogin()" class="btn btn-success w-100 py-2 fw-bold">Entrar</button>
        </div>
    </div>

    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar shadow-lg">
            <div class="sidebar-header">
                <div class="logo-wrapper">
                    <img src="./assets/img/logo.png" alt="Logo" class="sidebar-logo">
                </div>
                <span class="logo-text">Portal RT</span>
            </div>

            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" onclick="switchView('dashboard')">
                    <i class="fa-solid fa-cubes"></i> <span>Dashboard</span>
                </a>
                <a href="#" class="nav-item" onclick="switchView('ferramentas')">
                    <i class="fas fa-tools"></i> <span>Ferramentas</span>
                </a>
                <a href="#" class="nav-item" data-bs-toggle="modal" data-bs-target="#settingsModal">
                    <i class="fas fa-cog"></i> <span>Configurações</span>
                </a>
            </nav>

            <div class="sidebar-footer mt-auto">
                <button onclick="MainApp.logout()" class="logout-btn">
                    <i class="fas fa-sign-out-alt"></i> <span>Sair</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="top-bar-left">
                    <h1 id="page-title" class="h5 fw-bold mb-0">Dashboard de Pareceres</h1>
                </div>

                <div id="weather-widget" class="top-bar-center">
                    <div class="weather-loading small text-muted">
                        <i class="fas fa-spinner fa-spin me-1"></i> Carregando...
                    </div>
                </div>

                <div class="top-bar-right">
                    <button class="btn btn-link text-muted p-2" onclick="toggleTheme()">
                        <i id="theme-icon" class="fas fa-moon"></i>
                    </button>
                    <div class="user-info d-none d-md-flex flex-column align-items-end me-2">
                        <span class="x-small text-muted">Conectado como:</span>
                        <span id="user-display-email" class="small fw-bold text-primary">usuario@portal.com</span>
                    </div>
                    <div class="user-profile" data-bs-toggle="modal" data-bs-target="#settingsModal">
                        <div class="avatar" id="user-avatar">RT</div>
                    </div>
                </div>
            </header>

            <section class="content-wrapper">
                <!-- DASHBOARD -->
                <div id="view-dashboard" class="app-view">
                    <div id="dynamic-cards" class="row g-2 m-0">
                        <!-- Cards serão inseridos aqui via JavaScript -->
                    </div>

                    <!-- Ferramentas -->
                    <div class="row g-4 mt-4">
                        <!-- Calculadora -->
                        <div class="col-md-6 col-lg-4">
                            <div class="workspace-tool">
                                <h6 class="fw-bold text-info mb-3"><i class="fas fa-calculator me-2"></i>Calculadora
                                </h6>
                                <!-- ... seu conteúdo da calculadora ... -->
                            </div>
                        </div>

                        <!-- Busca Fiscal -->
                        <div class="col-md-6 col-lg-4">
                            <div class="workspace-tool">
                                <h6 class="fw-bold text-warning mb-3"><i class="fas fa-search me-2"></i>Fiscal</h6>
                                <!-- ... seu conteúdo fiscal ... -->
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Botão Flutuante -->
    <button class="btn-add shadow" onclick="MainApp.openCreate()">+</button>

    <!-- Modais -->
    <!-- (Mantenha seus modais: cardModal, settingsModal, confirmModal, locationModal) -->

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/ui.js"></script>

    <div id="toast-container" class="toast-container position-fixed bottom-0 start-50 translate-middle-x p-3"
        style="z-index: 3000;"></div>
</body>

</html>
