<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baixa de RT</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css">
    <link rel="stylesheet" href="css/padrao.css">
</head>
<body class="bg-dark text-light">

    <header class="text-center py-1">
        <h1>Portal de Pareceres - Baixa RT</h1>
    </header>

    <main class="container">
        <!-- Grid de Cards Dinâmicos -->
        <div id="main-grid" class="cards-grid"></div>

        <!-- Ferramentas Fixas (Calculadora e Busca) ao Final -->
        <div class="row mt-2 mb-2">
            <div class="col-md-4 mb-2">
                <div class="tool-box border-info">
                    <h6>Calculadora de Piso</h6>
                    <div class="d-flex">
                        <input id="piso" type="number" placeholder="Valor" class="form-control mr-1 form-control-sm">
                        <input id="horas" type="number" placeholder="Hrs" class="form-control form-control-sm">
                    </div>
                    <div class="mt-2 x-small">Total: R$ <span id="res-total">0</span> | Hora: R$ <span id="res-hora">0</span></div>
                </div>
            </div>
            <div class="col-md-4 mb-2">
                <div class="tool-box border-warning">
                    <h6>Busca de Fiscal</h6>
                    <select id="fiscal-select" class="form-control form-control-sm" disabled><option>Carregando...</option></select>
                    <div id="fiscal-res" class="mt-2 x-small text-muted">Aguardando...</div>
                </div>
            </div>
            <div class="col-md-4 mb-2">
                <div class="tool-box border-success">
                    <h6>Nuvem (GitHub)</h6>
                    <div class="d-flex mb-1">
                        <input id="gh-repo" type="text" placeholder="Repositório" class="form-control form-control-sm mr-1 w-50">
                        <input id="gh-token" type="password" placeholder="Token GitHub" class="form-control form-control-sm w-50">
                    </div>
                    <div class="d-flex">
                        <button onclick="MainApp.cloudBackup()" class="btn btn-xs btn-success flex-grow-1 mr-1">Backup</button>
                        <button onclick="MainApp.cloudRestore()" class="btn btn-xs btn-outline-success flex-grow-1">Sincronizar</button>
                    </div>
                    <div id="gh-status" class="mt-1 x-small text-muted">Não conectado</div>
                </div>
            </div>
        </div>
    </main>

    <button class="btn-add" onclick="MainApp.openCreate()">+</button>

    <!-- Modal Simplificado -->
    <div id="modal" class="modal-overlay">
        <div class="modal-box">
            <h6>Editar Card</h6>
            <input id="m-id" type="hidden">
            <input id="m-title" type="text" placeholder="Título" class="form-control mb-2">
            <div class="row mb-2">
                <div class="col-6">
                    <select id="m-type" class="form-control" onchange="MainApp.toggleLinkField()">
                        <option value="copy">Copiável (Texto)</option>
                        <option value="link">Link Externo</option>
                        <option value="pdf">Arquivo PDF</option>
                    </select>
                </div>
                <div class="col-6">
                    <select id="m-color" class="form-control">
                        <option value="light">Cor: Padrão</option>
                        <option value="danger">Cor: Vermelho</option>
                        <option value="warning">Cor: Amarelo</option>
                        <option value="info">Cor: Azul</option>
                    </select>
                </div>
            </div>
            <div id="link-field-group">
                <input id="m-link" type="text" placeholder="URL do Link ou Caminho do PDF" class="form-control mb-2">
            </div>
            <div class="row mb-1">
                <div class="col-4"><input id="m-local" type="text" placeholder="Local" class="form-control"></div>
                <div class="col-4"><input id="m-sit" type="text" placeholder="Situação" class="form-control"></div>
                <div class="col-4"><input id="m-julgamento" type="text" placeholder="Julgamento" class="form-control"></div>
            </div>
            <textarea id="m-content" rows="4" placeholder="Conteúdo" class="form-control mb-2"></textarea>
            <div class="text-right">
                <button onclick="MainApp.closeModal()" class="btn btn-sm btn-secondary">Cancelar</button>
                <button onclick="saveCard()" class="btn btn-sm btn-success">Salvar</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
